query AboutMe {
	aboutMe {
		_seoMetaTags {
			attributes
			content
			tag
		}
		backgroundImage {
			...SRCImage
		}
		stats
		businessPhoto {
			responsiveImage(
				imgixParams: {fm: webp, w: "768"}
			) {
				src
				srcSet
				width
				height
				alt
				sizes
			}
		}
		profilePhoto {
			responsiveImage(
				imgixParams: {fm: webp, h: "600", w: "600", fit: facearea, crop: focalpoint, facepad: "5"}
			) {
				src
				srcSet
				width
				height
				alt
				sizes
			}
		}
		biography {
			value
		}
		quote
		concepting
		design
		development
		management
		heading
		description
		photos {
			responsiveImage(
				imgixParams: {fm: webp, w: "768"}
			) {
				src
				srcSet
				width
				height
				alt
				sizes
			}
		}
	}
}
