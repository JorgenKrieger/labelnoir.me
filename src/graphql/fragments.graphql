fragment Code on CodeRecord {
	... on CodeRecord {
		_modelApiKey
		id
		language
		code
	}
}

fragment Text on TextRecord {
	... on TextRecord {
		_modelApiKey
		id
		content {
			value
		}
		fullWidth
		align
	}
}

fragment Quote on QuoteRecord {
	... on QuoteRecord {
		_modelApiKey
		id
		blockquote
	}
}

fragment Media on MediaItemRecord {
	... on MediaItemRecord {
		_modelApiKey
		id
		...ResponsiveImage
	}
}

fragment Gallery on GalleryRecord {
	... on GalleryRecord {
		_modelApiKey
		id
		galleryType
		assets {
			responsiveImage {
				# Always required
				src
				srcSet
				width
				height

				# Not required, but strongly suggested!
				alt
				title

				# Blur-up placeholder, JPEG format, base64-encoded, or...
				base64
				# Background color placeholder
				bgColor
			}
		}
	}
}

fragment ResponsiveImage on MediaItemRecord {
	asset {
		responsiveImage {
			# Always required
			src
			srcSet
			width
			height

			# Not required, but strongly suggested!
			alt
			title

			# Blur-up placeholder, JPEG format, base64-encoded, or...
			base64
			# Background color placeholder
			bgColor
		}
	}
}
