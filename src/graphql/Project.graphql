query Project($slug: String!) {
	project(filter: {slug: {eq: $slug}}) {
		title
		subtitle
		challenge
		outcome
		quote
		agency
		year
		scope
		websiteUrl
		featuredImage {
			responsiveImage {
				# Always required
				src
				srcSet
				width
				height

				# Not required, but strongly suggested!
				alt
				title

				# Blur-up placeholder, JPEG format, base64-encoded, or...
				base64
				# Background color placeholder
				bgColor
			}
		}
		pageBuilder {
			id
			content {
				...Text
				...Quote
				...Media
				...Gallery
			}
		}
	}
}
