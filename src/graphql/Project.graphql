query Project($slug: String!) {
	project(filter: {slug: {eq: $slug}}) {
		seo: _seoMetaTags {
			attributes
			content
			tag
		}
		title
		subtitle
		challenge
		outcome
		quote
		agency
		year
		scope
		websiteUrl
		featuredImage {
			...SRCImage
		}
		pageBuilder {
			id
			content {
				...Text
				...Quote
				...Media
				...Gallery
			}
		}
	}
}
