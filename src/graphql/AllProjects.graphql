query AllProjects {
	allProjects {
		title
		subtitle
		slug
		featuredImage {
			responsiveImage {
				# Always required
				src
				srcSet
				width
				height

				# Not required, but strongly suggested!
				alt
				title

				# Blur-up placeholder, JPEG format, base64-encoded, or...
				base64
				# Background color placeholder
				bgColor
			}
		}
	}
}
